name: Auto Update Casks

on:
  schedule:
    - cron: "0 6 * * *" # Run daily at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tap this repository
        run: brew tap orphaninstance/homebrew-tap

      - name: Check for updates and bump
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GH_AUTOMATION_TOKEN }}
        run: |
          set -o pipefail
          brew bump --cask --open-pr --no-pull-requests --tap orphaninstance/homebrew-tap
