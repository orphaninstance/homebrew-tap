name: Auto Update Casks

on:
  schedule:
    - cron: "0 6 * * *" # Run daily at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tap this repository
        run: brew tap orphaninstance/homebrew-tap

      - name: Check for updates and bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail

          # Run the Ruby bumper script
          ruby .github/scripts/bump_casks.rb
          BUMP_STATUS=$?

          if [ $BUMP_STATUS -eq 2 ]; then
            echo "No updates needed."
            exit 0
          elif [ $BUMP_STATUS -ne 0 ]; then
            echo "An error occurred in the bump script (Exit code: $BUMP_STATUS)."
            exit 1
          fi

          # If BUMP_STATUS is 0, we proceed to commit and push changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          else
            # Get the version from the file for branch naming and commit message
            FINAL_VERSION=$(grep 'version' Casks/kitty-linux.rb | awk -F '"' '{print $2}')
            BRANCH_NAME="auto-update-kitty-${FINAL_VERSION}"

            git checkout -b "$BRANCH_NAME"
            git commit -m "Update kitty-linux to version ${FINAL_VERSION}"
            git push origin "$BRANCH_NAME"

            # Create Pull Request and add the trigger label
            gh pr create --title "Update kitty-linux to version ${FINAL_VERSION}" \
                             --body "Automated update of kitty-linux to version ${FINAL_VERSION}." \
                             --base main \
                             --head "$BRANCH_NAME"

            # Add the label that triggers the merge job
            gh pr edit --add-label "pr-pull"
          fi
