name: Auto Update Casks

on:
  schedule:
    - cron: "0 6 * * *" # Run daily at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tap this repository
        run: brew tap orphaninstance/homebrew-tap

      - name: Check for updates and bump
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GH_AUTOMATION_TOKEN }}
        run: |
          set -o pipefail
          brew bump --cask --open-pr --tap orphaninstance/homebrew-tap

          # Add the trigger label to any newly created update PRs
          echo "Adding 'pr-pull' labels to new update PRs..."
          gh pr list --json number,title -q '.[] | select(.title | startswith("Update")) | .number' | xargs -I {} gh pr edit {} --add-label "pr-pull"
